        [data-theme="light"] {
            --bg: #f1f5f9; --bg-2: #e2e8f0; --panel: rgba(0,0,0,.04);

        /* ===== TOP BAR ===== */
        .top-bar {

            background: rgba(6,13,27,.75); backdrop-filter: blur(20px) saturate(1.8);

        /* ===== INFOGRAPHIC WRAPPER ===== */
        .infographic-wrapper {

            border-radius: var(--radius); background: #f8fafc; padding: 10px;

        .infographic-wrapper svg .appear:hover { opacity: 0.95; }

        /* ===== PRINT PROTECTION ===== */
        @media print { html, body, * { display: none !important; visibility: hidden !important; height: 0 !important; width: 0 !important; margin: 0 !important; padding: 0 !important; border: 0 !important; background: transparent !important; } }
        @media screen and (display-mode: standalone) { body { -webkit-app-region: no-drag; } }

        /* ===== SECURITY TOAST ===== */
        .security-toast {
            position: fixed; bottom: 30px; right: 50%; transform: translateX(50%) translateY(100px);
            background: rgba(239,68,68,.15); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(239,68,68,.35); color: #ef4444; padding: 14px 28px;
            border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; z-index: 100000;

            transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.4s;
            opacity: 0; pointer-events: none;
        }
        .security-toast.show { transform: translateX(50%) translateY(0); opacity: 1; }
        .security-toast i { font-size: 16px; animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.2); text-shadow: 0 0 10px rgba(239,68,68,0.8); } 100% { transform: scale(1); } }

        /* ===== SECURITY OVERLAY ===== */
        .security-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(6,13,27,.96); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: 999999; display: none; justify-content: center; align-items: center;

        }

        .security-card {
            background: rgba(15,27,51,.85); border: 1px solid rgba(239,68,68,.3);

            animation: cardPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275); position: relative; overflow: hidden;
        }
        .security-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, #ef4444, #fbbf24, #ef4444); background-size: 200% 100%; animation: borderGlow 3s linear infinite; }
        @keyframes borderGlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        .security-card .warning-icon { font-size: 60px; color: #ef4444; margin-bottom: 20px; display: inline-block; animation: heartBeat 1.5s infinite; }

        .security-btn { background: linear-gradient(135deg, #ef4444, #b91c1c); border: none; color: white; padding: 14px 28px; border-radius: var(--radius-sm); font-weight: 700; cursor: pointer; width: 100%; transition: all 0.3s; box-shadow: 0 4px 15px rgba(239,68,68,.4); font-size: 15px; font-family: inherit; }
        .security-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(239,68,68,.6); background: linear-gradient(135deg, #f87171, #dc2626); }
        .security-btn:active { transform: translateY(0); }
        .contact-admin { margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,.1); display: flex; justify-content: center; gap: 15px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes cardPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes heartBeat { 0% { transform: scale(1); } 14% { transform: scale(1.1); } 28% { transform: scale(1); } 42% { transform: scale(1.1); } 70% { transform: scale(1); } }

        /* ===== CARD MODAL ===== */
        .card-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(6,13,27,.92); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: 200000; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.4s ease; padding: 20px;

        .card-modal.show { display: flex; opacity: 1; }
        .modal-content {
            width: 95%; max-width: 900px; background: #f8fafc; border-radius: 28px; padding: 16px;

        .close-modal {

        @media(max-width:768px) {

        @media print { body, html, .main-content, .document, .watermark, .contact-buttons { display: none !important; visibility: hidden !important; height: 0 !important; width: 0 !important; overflow: hidden !important; } }

        ::-webkit-scrollbar { width: 6px; }

        ::-webkit-scrollbar-thumb:hover { background: rgba(56,189,248,.5); }

        /* ===== PARTICLES ===== */
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .particle { position: absolute; width: 3px; height: 3px; border-radius: 50%; opacity: 0; animation: particleFloat linear infinite; }
        .particle:nth-child(1) { left: 10%; background: #38bdf8; animation-duration: 12s; animation-delay: 0s; }
        .particle:nth-child(2) { left: 25%; background: #8b5cf6; animation-duration: 15s; animation-delay: 2s; }
        .particle:nth-child(3) { left: 40%; background: #fbbf24; animation-duration: 10s; animation-delay: 4s; }
        .particle:nth-child(4) { left: 55%; background: #4ade80; animation-duration: 14s; animation-delay: 1s; }
        .particle:nth-child(5) { left: 70%; background: #38bdf8; animation-duration: 11s; animation-delay: 3s; }
        .particle:nth-child(6) { left: 85%; background: #8b5cf6; animation-duration: 13s; animation-delay: 5s; }
        .particle:nth-child(7) { left: 15%; background: #fbbf24; animation-duration: 16s; animation-delay: 6s; }
        .particle:nth-child(8) { left: 60%; background: #4ade80; animation-duration: 9s; animation-delay: 7s; }
        @keyframes particleFloat { 0% { opacity: 0; transform: translateY(100vh) scale(0); } 10% { opacity: .6; transform: translateY(90vh) scale(1); } 90% { opacity: .6; } 100% { opacity: 0; transform: translateY(-10vh) scale(0.5); } }

        .glow-top { position: fixed; top: -200px; right: -200px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(139,92,246,.08) 0%, transparent 70%); pointer-events: none; z-index: 0; }

        <div class="modal-content"></div>
    </div>

    

    <script>
        document.addEventListener('DOMContentLoaded',()=>{
            const cards=document.querySelectorAll('.infographic-wrapper svg .appear');
            const modal=document.getElementById('card-modal');
            const modalContent=document.querySelector('.modal-content');
            const closeModalBtn=document.querySelector('.close-modal');

            cards.forEach(c=>{
                c.addEventListener('click',function(e){
                    const isTopCard=this.classList.contains('d1')||this.classList.contains('d2');
                    modalContent.style.aspectRatio=isTopCard?'610 / 220':'610 / 305';
                    modalContent.style.maxWidth=isTopCard?'900px':'800px';
                    const mainSvg=document.querySelector('.infographic-wrapper svg');
                    const defs=mainSvg.querySelector('defs').cloneNode(true);
                    const style=mainSvg.querySelector('style').cloneNode(true);
                    const modalSvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
                    modalSvg.setAttribute('viewBox',isTopCard?'0 0 610 220':'0 0 610 305');
                    modalSvg.setAttribute('width','100%');modalSvg.setAttribute('height','100%');
                    modalSvg.appendChild(style);modalSvg.appendChild(defs);
                    const floatGroup=this.querySelector('.float').cloneNode(true);
                    modalSvg.appendChild(floatGroup);
                    modalContent.innerHTML='';modalContent.appendChild(modalSvg);
                    modal.classList.add('show');
                });
            });
            if(closeModalBtn)closeModalBtn.addEventListener('click',()=>{modal.classList.remove('show');});
            if(modal)modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('show');});
            document.addEventListener('keydown',e=>{if(e.key==='Escape'&&modal.classList.contains('show'))modal.classList.remove('show');});
        });
    </script>
