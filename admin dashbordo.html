<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chemistry Code - Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Cairo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #020617; color: #e2e8f0; min-height: 100vh; }
    body.rtl { font-family: 'Cairo', sans-serif; direction: rtl; }
    .gradient-text { background: linear-gradient(135deg, #10b981, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(16, 185, 129, 0.15); }
    .glow-green { box-shadow: 0 0 30px rgba(16, 185, 129, 0.3), 0 0 60px rgba(16, 185, 129, 0.1); }
    .code-font { font-family: 'JetBrains Mono', monospace; }
    .tab-btn { transition: all 0.2s; }
    .tab-btn.active { background: linear-gradient(135deg, #10b981, #06b6d4); color: white; }
    .tab-btn:not(.active) { color: #94a3b8; }
    .tab-btn:not(.active):hover { background: #1e293b; color: white; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .status-used { background: rgba(239,68,68,0.1); color: #f87171; }
    .status-unused { background: rgba(16,185,129,0.1); color: #34d399; }
    .status-pending { background: rgba(245,158,11,0.1); color: #fbbf24; }
    .status-approved { background: rgba(16,185,129,0.1); color: #34d399; }
    .status-rejected { background: rgba(239,68,68,0.1); color: #f87171; }
    .btn-primary { background: linear-gradient(135deg, #10b981, #06b6d4); color: white; }
    .btn-primary:hover { transform: scale(1.02); }
    .btn-danger { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .input-field { background: #0f172a; border: 2px solid #334155; border-radius: 12px; padding: 10px 16px; color: white; width: 100%; outline: none; transition: border-color 0.2s; }
    .input-field:focus { border-color: #10b981; }
    .input-field::placeholder { color: #475569; }
    .table-row:hover { background: rgba(30,41,59,0.5); }
    .copy-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 600; z-index: 9999; animation: toastIn 0.3s ease; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
    .modal-content { background: #1e293b; border: 1px solid rgba(16,185,129,0.2); border-radius: 20px; padding: 32px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 3px; }
  </style>
</head>

<!-- LOGIN SCREEN -->

    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2" id="usernameLabel">Username</label>
        <input type="text" id="loginUsername" class="input-field" placeholder="admin" value="admin">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2" id="passwordLabel">Password</label>
        <input type="password" id="loginPassword" class="input-field" placeholder="••••••••" value="chemistry2024">
      </div>
      <div id="loginError" class="hidden p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm text-center"></div>
      <button onclick="handleLogin()" class="w-full py-3 btn-primary font-semibold rounded-xl text-lg transition-transform" id="loginBtn">Login</button>
      <button onclick="toggleLang()" class="w-full py-2 bg-slate-800 text-slate-300 rounded-xl hover:bg-slate-700 transition-colors text-sm" id="langBtn">العربية</button>
    </div>
    <div class="mt-6 p-4 bg-amber-500/5 border border-amber-500/20 rounded-lg">
      <p class="text-amber-400 text-xs text-center">Demo: admin / chemistry2024</p>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen" class="hidden min-h-screen">
  <!-- Header -->
  <div class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-emerald-500 to-cyan-500 flex items-center justify-center text-white font-bold text-lg">⚛</div>
        <div>
          <h1 class="text-lg font-bold text-white" id="dashTitle">Chemistry Code Admin</h1>
          <p class="text-xs text-slate-400" id="dashWelcome">Welcome, admin</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="toggleLang()" class="px-3 py-1.5 text-sm bg-slate-800 text-slate-300 rounded-lg hover:bg-slate-700 transition-colors border border-slate-700" id="dashLangBtn">العربية</button>
        <button onclick="handleLogout()" class="px-4 py-2 btn-danger rounded-lg text-sm font-medium" id="logoutBtn">Logout</button>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="bg-slate-900/50 border-b border-slate-800 sticky top-[60px] z-40">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex gap-2 overflow-x-auto py-2" id="tabsContainer">
        <button class="tab-btn active px-4 py-2 rounded-lg font-medium text-sm whitespace-nowrap" onclick="switchTab('overview')" data-tab="overview">📊 <span class="tab-label">Overview</span></button>
        <button class="tab-btn px-4 py-2 rounded-lg font-medium text-sm whitespace-nowrap" onclick="switchTab('codes')" data-tab="codes">🔑 <span class="tab-label">Codes</span></button>
        <button class="tab-btn px-4 py-2 rounded-lg font-medium text-sm whitespace-nowrap" onclick="switchTab('payments')" data-tab="payments">💳 <span class="tab-label">Payments</span></button>
        <button class="tab-btn px-4 py-2 rounded-lg font-medium text-sm whitespace-nowrap" onclick="switchTab('users')" data-tab="users">👥 <span class="tab-label">Users</span></button>
        <button class="tab-btn px-4 py-2 rounded-lg font-medium text-sm whitespace-nowrap" onclick="switchTab('chapters')" data-tab="chapters">📚 <span class="tab-label">Chapters</span></button>
        <button class="tab-btn px-4 py-2 rounded-lg font-medium text-sm whitespace-nowrap" onclick="switchTab('settings')" data-tab="settings">⚙️ <span class="tab-label">Settings</span></button>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="max-w-7xl mx-auto px-4 py-8" id="tabContent"></div>
</div>

<!-- Toast -->
<div id="toast" class="copy-toast hidden"></div>

<!-- Modal -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal-content" id="modalContent"></div>
</div>

function t(section, key) {
  return i18n[currentLang][section]?.[key] || key;
}

// ===== STORAGE =====
function getCodes() { try { return JSON.parse(localStorage.getItem('cc_codes') || '[]'); } catch { return []; } }
function saveCodes(codes) { localStorage.setItem('cc_codes', JSON.stringify(codes)); }
function getPayments() { try { return JSON.parse(localStorage.getItem('cc_payments') || '[]'); } catch { return []; } }
function savePayments(payments) { localStorage.setItem('cc_payments', JSON.stringify(payments)); }
function getUsers() { try { return JSON.parse(localStorage.getItem('cc_users') || '[]'); } catch { return []; } }
function saveUsers(users) { localStorage.setItem('cc_users', JSON.stringify(users)); }
function getSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('cc_settings') || '{}');
    return { vodafone: '01068018005', instapay: 'chemistrycode@instapay', orange: '01068018005', price: '150', ...s };
  } catch { return { vodafone: '01068018005', instapay: 'chemistrycode@instapay', orange: '01068018005', price: '150' }; }
}
function saveSettings(s) { localStorage.setItem('cc_settings', JSON.stringify(s)); }

// ===== AUTH =====
function handleLogin() {
  const u = document.getElementById('loginUsername').value.trim();
  const p = document.getElementById('loginPassword').value.trim();
  if (u === ADMIN_CREDS.username && p === ADMIN_CREDS.password) {
    localStorage.setItem('cc_admin_auth', 'true');
    showDashboard();
  } else {
    const err = document.getElementById('loginError');
    err.textContent = currentLang === 'ar' ? 'اسم المستخدم أو كلمة المرور غير صحيحة' : 'Invalid username or password';
    err.classList.remove('hidden');
    setTimeout(() => err.classList.add('hidden'), 3000);
  }
}

function handleLogout() {
  localStorage.removeItem('cc_admin_auth');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('dashboardScreen').classList.add('hidden');
}

function showDashboard() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('dashboardScreen').classList.remove('hidden');
  updateUIText();
  switchTab('overview');
}

// ===== LANGUAGE =====
function toggleLang() {
  currentLang = currentLang === 'en' ? 'ar' : 'en';
  document.body.classList.toggle('rtl', currentLang === 'ar');
  document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = currentLang;
  updateUIText();
  switchTab(currentTab);
}

function updateUIText() {
  const L = i18n[currentLang];
  document.getElementById('loginTitle').textContent = L.loginTitle;
  document.getElementById('loginSubtitle').textContent = L.loginSubtitle;
  document.getElementById('usernameLabel').textContent = L.usernameLabel;
  document.getElementById('passwordLabel').textContent = L.passwordLabel;
  document.getElementById('loginBtn').textContent = L.loginBtn;
  document.getElementById('langBtn').textContent = L.langBtn;
  document.getElementById('dashLangBtn').textContent = L.dashLangBtn;
  document.getElementById('dashTitle').textContent = L.dashTitle;
  document.getElementById('dashWelcome').textContent = L.dashWelcome;
  document.getElementById('logoutBtn').textContent = L.logoutBtn;

  document.querySelectorAll('.tab-btn').forEach(btn => {
    const tab = btn.dataset.tab;
    if (tab && L.tabs[tab]) {
      btn.querySelector('.tab-label').textContent = L.tabs[tab];
    }
  });
}

// ===== TABS =====
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  const content = document.getElementById('tabContent');
  switch(tab) {
    case 'overview': content.innerHTML = renderOverview(); break;
    case 'codes': content.innerHTML = renderCodes(); break;
    case 'payments': content.innerHTML = renderPayments(); break;
    case 'users': content.innerHTML = renderUsers(); break;
    case 'chapters': content.innerHTML = renderChapters(); break;
    case 'settings': content.innerHTML = renderSettings(); break;
  }
  content.classList.add('fade-in');
  setTimeout(() => content.classList.remove('fade-in'), 300);
}

// ===== GENERATE CODE =====
function generateCode(prefix = 'CC') {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const p = (n) => Array.from({length:n}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
  return `${prefix}-${p(4)}-${p(4)}-${p(4)}`;
}

// ===== OVERVIEW TAB =====
function renderOverview() {
  const codes = getCodes();
  const payments = getPayments();
  const users = getUsers();
  const L = i18n[currentLang].overview;

  const usedCodes = codes.filter(c => c.used).length;
  const unusedCodes = codes.filter(c => !c.used).length;
  const pendingPayments = payments.filter(p => p.status === 'pending').length;
  const approvedPayments = payments.filter(p => p.status === 'approved').length;
  const premiumUsers = users.filter(u => u.status === 'premium').length;
  const freeUsers = users.filter(u => u.status === 'free').length;
  const totalRevenue = approvedPayments * 150;

  return `
    <h2 class="text-2xl font-bold text-white mb-6">${L.title}</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="glass-card p-6 rounded-xl">
        <div class="text-3xl mb-2">🔑</div>
        <div class="text-3xl font-bold text-white mb-1">${codes.length}</div>
        <div class="text-slate-400 text-sm">${L.totalCodes}</div>
        <div class="mt-2 text-xs text-slate-500">${usedCodes} ${L.used} / ${unusedCodes} ${L.unused}</div>
      </div>
      <div class="glass-card p-6 rounded-xl">
        <div class="text-3xl mb-2">💳</div>
        <div class="text-3xl font-bold text-white mb-1">${payments.length}</div>
        <div class="text-slate-400 text-sm">${L.payments}</div>
        <div class="mt-2 text-xs text-slate-500">${pendingPayments} ${L.pending} / ${approvedPayments} ${L.approved}</div>
      </div>
      <div class="glass-card p-6 rounded-xl">
        <div class="text-3xl mb-2">👥</div>
        <div class="text-3xl font-bold text-white mb-1">${users.length}</div>
        <div class="text-slate-400 text-sm">${L.users}</div>

function handleGenerateCodes() {
  const count = parseInt(document.getElementById('codeCount').value) || 1;
  const prefix = (document.getElementById('codePrefix').value || 'CC').toUpperCase();
  const notes = document.getElementById('codeNotes').value.trim();

  const codes = getCodes();
  newGeneratedCodes = [];
  for (let i = 0; i < Math.min(count, 100); i++) {
    const code = { code: generateCode(prefix), createdAt: new Date().toISOString(), used: false, notes };
    codes.push(code);
    newGeneratedCodes.push(code);
  }
  saveCodes(codes);
  switchTab('codes');
  showToast(currentLang === 'ar' ? `تم إنشاء ${newGeneratedCodes.length} كود بنجاح!` : `${newGeneratedCodes.length} codes generated!`);
}

function deleteCode(code) {
  const L = i18n[currentLang].codes;
  if (!confirm(L.confirmDelete)) return;
  const codes = getCodes().filter(c => c.code !== code);
  saveCodes(codes);
  switchTab('codes');
}

function showAssignModal(code) {
  const L = i18n[currentLang].codes;
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modalContent').innerHTML = `
    <h3 class="text-xl font-bold text-white mb-4">${L.assignTitle}</h3>
    <p class="text-slate-400 text-sm mb-4">Code: <code class="text-emerald-400 code-font">${code}</code></p>
    <div class="space-y-3 mb-6">
      <input type="text" id="assignName" class="input-field" placeholder="${L.assignTo}">
      <input type="email" id="assignEmail" class="input-field" placeholder="${L.assignEmail}">
    </div>
    <div class="flex gap-3">
      <button onclick="assignCode('${code}')" class="flex-1 py-3 btn-primary rounded-xl font-semibold">${L.assignBtn}</button>
      <button onclick="closeModal()" class="flex-1 py-3 bg-slate-800 text-slate-300 rounded-xl font-semibold">${L.cancel}</button>
    </div>
  `;
}

function assignCode(code) {
  const name = document.getElementById('assignName').value.trim();
  const email = document.getElementById('assignEmail').value.trim();
  if (!name) return;
  const codes = getCodes();
  const idx = codes.findIndex(c => c.code === code);
  if (idx !== -1) {
    codes[idx].used = true;
    codes[idx].assignedTo = name;
    codes[idx].assignedEmail = email;
    codes[idx].usedAt = new Date().toISOString();
    saveCodes(codes);

    const users = getUsers();
    users.push({ name, email, registeredAt: new Date().toISOString(), code, status: 'premium' });
    saveUsers(users);
  }
  closeModal();
  switchTab('codes');
  showToast(currentLang === 'ar' ? 'تم تعيين الكود بنجاح!' : 'Code assigned!');
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

function copyAllNewCodes() {
  const text = newGeneratedCodes.map(c => c.code).join('\n');
  copyText(text);
}

function exportCodesCSV() {
  const codes = getCodes();
  const csv = 'Code,Status,Created,Assigned To,Email,Notes\n' +
    codes.map(c => `${c.code},${c.used ? 'USED' : 'UNUSED'},${c.createdAt},${c.assignedTo || ''},${c.assignedEmail || ''},${c.notes || ''}`).join('\n');
  downloadFile(csv, `chemistry-codes-${new Date().toISOString().split('T')[0]}.csv`, 'text/csv');
  showToast(currentLang === 'ar' ? 'تم تصدير الأكواد!' : 'Codes exported!');
}

function approvePayment(id) {
  const L = i18n[currentLang].payments;
  if (!confirm(L.confirmApprove)) return;
  const payments = getPayments();
  const idx = payments.findIndex(p => p.id === id);
  if (idx !== -1) {
    const code = generateCode('CC');
    payments[idx].status = 'approved';
    payments[idx].generatedCode = code;
    savePayments(payments);

    const codes = getCodes();
    codes.push({ code, createdAt: new Date().toISOString(), used: false, assignedTo: payments[idx].name, assignedEmail: payments[idx].email, notes: 'Auto-generated for payment' });
    saveCodes(codes);
  }
  switchTab('payments');
  showToast(currentLang === 'ar' ? 'تمت الموافقة وإنشاء الكود!' : 'Approved & code generated!');
}

function rejectPayment(id) {
  const L = i18n[currentLang].payments;
  if (!confirm(L.confirmReject)) return;
  const payments = getPayments();
  const idx = payments.findIndex(p => p.id === id);
  if (idx !== -1) {
    payments[idx].status = 'rejected';
    savePayments(payments);
  }
  switchTab('payments');
}

      <div class="glass-card p-6 rounded-xl">
        <h3 class="text-lg font-semibold text-white mb-4">${L.paymentConfig}</h3>
        <div class="space-y-3">
          <div>
            <label class="block text-sm text-slate-400 mb-1">${L.vodafoneNumber}</label>
            <input type="text" id="settVodafone" value="${s.vodafone}" class="input-field code-font">
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">${L.instapayId}</label>
            <input type="text" id="settInstapay" value="${s.instapay}" class="input-field code-font">
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">${L.orangeNumber}</label>
            <input type="text" id="settOrange" value="${s.orange}" class="input-field code-font">
          </div>
          <div>
            <label class="block text-sm text-slate-400 mb-1">${L.price} (EGP)</label>
            <input type="text" id="settPrice" value="${s.price}" class="input-field">
          </div>
          <button onclick="handleSaveSettings()" class="w-full py-3 btn-primary rounded-xl font-semibold mt-2">${L.saveSettings} ✅</button>
        </div>
      </div>

      <div class="glass-card p-6 rounded-xl lg:col-span-2">
        <h3 class="text-lg font-semibold text-white mb-4">${L.advancedActions}</h3>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
          <button onclick="exportAllData()" class="py-3 bg-blue-500/10 border border-blue-500/30 text-blue-400 rounded-xl hover:bg-blue-500/20 transition-colors font-medium">
            📥 ${L.exportAll}
          </button>
          <button onclick="document.getElementById('importFile').click()" class="py-3 bg-purple-500/10 border border-purple-500/30 text-purple-400 rounded-xl hover:bg-purple-500/20 transition-colors font-medium">
            📤 ${L.importData}
          </button>
          <button onclick="clearAllData()" class="py-3 btn-danger rounded-xl font-medium">
            🗑️ ${L.clearAll}
          </button>
        </div>
        <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
      </div>
    </div>
  `;
}

function handleSaveSettings() {
  const s = {
    vodafone: document.getElementById('settVodafone').value.trim(),
    instapay: document.getElementById('settInstapay').value.trim(),
    orange: document.getElementById('settOrange').value.trim(),
    price: document.getElementById('settPrice').value.trim(),
  };
  saveSettings(s);
  showToast(currentLang === 'ar' ? 'تم حفظ الإعدادات!' : 'Settings saved!');
}

function exportAllData() {
  const data = { codes: getCodes(), payments: getPayments(), users: getUsers(), settings: getSettings(), exportedAt: new Date().toISOString() };
  downloadFile(JSON.stringify(data, null, 2), `chemistry-code-backup-${new Date().toISOString().split('T')[0]}.json`, 'application/json');
  showToast(currentLang === 'ar' ? 'تم تصدير البيانات!' : 'Data exported!');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.codes) saveCodes(data.codes);
      if (data.payments) savePayments(data.payments);
      if (data.users) saveUsers(data.users);
      if (data.settings) saveSettings(data.settings);
      switchTab('overview');
      showToast(currentLang === 'ar' ? 'تم استيراد البيانات!' : 'Data imported!');
    } catch { showToast(currentLang === 'ar' ? 'خطأ في الملف!' : 'Invalid file!'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function clearAllData() {
  const L = i18n[currentLang].settings;
  if (!confirm(L.clearConfirm)) return;
  localStorage.removeItem('cc_codes');
  localStorage.removeItem('cc_payments');
  localStorage.removeItem('cc_users');
  switchTab('overview');
  showToast(currentLang === 'ar' ? 'تم حذف جميع البيانات!' : 'All data cleared!');
}

// ===== UTILITIES =====
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    showToast(currentLang === 'ar' ? 'تم النسخ!' : 'Copied!');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(currentLang === 'ar' ? 'تم النسخ!' : 'Copied!');
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.remove('hidden');
  setTimeout(() => toast.classList.add('hidden'), 2500);
}

function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('cc_admin_auth') === 'true') {
    showDashboard();
  }
  document.getElementById('loginPassword').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
});
</script>
</body>
</html>
